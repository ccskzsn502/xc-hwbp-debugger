name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure tests
        run: cmake -S . -B build-tests -DXC_BUILD_AGENT=OFF -DXC_BUILD_PC_CLIENT=OFF -DXC_BUILD_TESTS=ON
      - name: Build tests
        run: cmake --build build-tests --parallel
      - name: Run tests
        run: ctest --test-dir build-tests --output-on-failure

  pc-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build-win -DXC_BUILD_AGENT=OFF -DXC_BUILD_PC_CLIENT=ON -DEUI_BUILD_APPS=OFF -DGLFW_BUILD_WAYLAND=OFF
      - name: Build
        run: cmake --build build-win --config Release --parallel
      - name: Stage PC Windows artifact
        shell: pwsh
        run: |
          $packageDir = "build-win/package/xc-hwbp-debugger-windows"
          cmake --install build-win --config Release --prefix $packageDir
          $exe = Join-Path $packageDir "xc-hwbp-debugger.exe"
          $assetsDir = Join-Path $packageDir "assets"
          if (!(Test-Path -LiteralPath $exe)) {
            throw "Missing installed Windows GUI executable."
          }
          if (!(Test-Path -LiteralPath $assetsDir)) {
            throw "Missing installed EUI assets directory."
          }
          if (!(Get-ChildItem -LiteralPath $assetsDir -Filter "*.ttf" -File -ErrorAction SilentlyContinue)) {
            throw "Missing installed TTF font assets."
          }
          if (!(Get-ChildItem -LiteralPath $assetsDir -Filter "*.otf" -File -ErrorAction SilentlyContinue)) {
            throw "Missing installed OTF font assets."
          }
          Get-ChildItem -LiteralPath $packageDir -Recurse | Sort-Object FullName | Format-Table FullName,Length
      - name: Verify PC Windows artifact starts without VC runtime DLLs
        shell: pwsh
        run: |
          $exe = "build-win/package/xc-hwbp-debugger-windows/xc-hwbp-debugger.exe"
          $dumpbin = $null
          $vswhere = "${env:ProgramFiles(x86)}/Microsoft Visual Studio/Installer/vswhere.exe"
          if (Test-Path $vswhere) {
            $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            if ($vsPath) {
              $dumpbin = Get-ChildItem -Path (Join-Path $vsPath "VC/Tools/MSVC") -Recurse -Filter dumpbin.exe | Where-Object { $_.FullName -like "*Hostx64*x64*dumpbin.exe" } | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
            }
          }
          if (!$dumpbin) {
            $dumpbin = (Get-Command dumpbin.exe -ErrorAction Stop).Source
          }
          $imports = & $dumpbin /DEPENDENTS $exe
          $imports | Out-String | Write-Host
          if ($imports -match "MSVCP140|VCRUNTIME140") {
            throw "Windows GUI artifact still depends on VC runtime DLLs. Build must use the static MSVC runtime so the downloaded GUI can open on clean machines."
          }
      - name: Upload PC Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: xc-hwbp-debugger-windows-exe
          path: build-win/package/xc-hwbp-debugger-windows/

  android-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Android agent
        run: |
          cmake -S . -B build-agent \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DXC_BUILD_AGENT=ON \
            -DXC_BUILD_PC_CLIENT=OFF
      - name: Build Android agent
        run: cmake --build build-agent --parallel
      - name: Verify Android agent artifact
        run: |
          file build-agent/agent/xc-hwbp-agent
          ls -lh build-agent/agent/xc-hwbp-agent
          strings build-agent/agent/xc-hwbp-agent | grep -E "lsdriver|driver.status|/proc/modules|xc-hwbp-agent"
      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: xc-hwbp-agent-android-arm64
          path: build-agent/agent/xc-hwbp-agent
